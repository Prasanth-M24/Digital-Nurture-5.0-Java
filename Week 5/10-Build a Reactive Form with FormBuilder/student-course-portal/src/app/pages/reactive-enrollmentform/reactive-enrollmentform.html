<div class="form-container">
    <h1 class="form-header">Reactive Enrollment Form</h1>

    <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()" class="enrollment-form">
        <label for="name" class="form-label">Name:</label>
        <input type="text" id="name" formControlName="studentName" class="form-input">
        <div *ngIf="enrollForm.get('studentName')?.invalid && enrollForm.get('studentName')?.touched" class="error">
            <span *ngIf="enrollForm.get('studentName')?.errors?.['required']">Name  is required.</span>
            <span *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">Name must be at least 3 characters long.</span>
        </div>
        <label for="email" class="form-label">Email:</label>
        <input type="email" id="email" formControlName="studentEmail" class="form-input">
        <div *ngIf="enrollForm.get('studentEmail')?.invalid && enrollForm.get('studentEmail')?.touched" class="error">
            <span *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">Email is required.</span>
            <span *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">Please enter a valid email address.</span>
        </div>
        <label for="course" class="form-label">Course ID:</label>
        <input type="number" id="course" formControlName="courseId" class="form-input">
        <div *ngIf="enrollForm.get('courseId')?.invalid && enrollForm.get('courseId')?.touched" class="error">
            <span *ngIf="enrollForm.get('courseId')?.errors?.['required']">Course ID is required.</span>
        </div>
        <label for="semester" class="form-label">Preferred Semester:</label>
        <select id="semester" formControlName="preferredSemester" class="form-select">
            <option value="" disabled>Select Semester</option>
            <option value="Odd">Odd</option>
            <option value="Even">Even</option>
        </select>
        <div *ngIf="enrollForm.get('preferredSemester')?.invalid && enrollForm.get('preferredSemester')?.touched" class="error">
            <span *ngIf="enrollForm.get('preferredSemester')?.errors?.['required']">Preferred semester is required.</span>
        </div>
        <div class="terms-container">
            <input type="checkbox" id="agreeToTerms" formControlName="agreeToTerms" class="form-checkbox">
            <label for="agreeToTerms">
                I agree to the <a href="#">Terms and Conditions</a>
            </label>
            <div *ngIf="enrollForm.get('agreeToTerms')?.invalid && enrollForm.get('agreeToTerms')?.touched" class="error">
                <span *ngIf="enrollForm.get('agreeToTerms')?.errors?.['required']">You must agree to the terms.</span>
            </div>
        </div>
        <button type="submit" [disabled]="enrollForm.invalid" class="form-button">Submit</button>
    </form>
</div>

<!--  the difference between enrollForm.value (excludes disabled controls) => It is used to submitting form data. . -->
<!--  enrollForm.getRawValue() (includes all controls) =>   It is used to access the raw form values. -->
